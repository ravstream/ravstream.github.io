<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RavStream - AI Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f43f5e;
            --primary-dark: #e11d48;
            --secondary: #fb7185;
            --accent: #fda4af;
            --cyan: #06b6d4;
            --cyan-light: #22d3ee;
            --success: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #fecdd3;
            --text-muted: #94a3b8;
            --bg-primary: #030712;
            --bg-secondary: #0f172a;
            --bg-purple: #1a0a2e;
            --border-light: rgba(148, 163, 184, 0.1);
            --border-medium: rgba(148, 163, 184, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Animated Background with Deep Purple Gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #1a0a2e 0%, #030712 50%, #0a0a1a 100%);
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(244, 63, 94, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(251, 113, 133, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        /* Light Rays for Premium AI Feel */
        .light-rays {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
        }

        .light-rays::before,
        .light-rays::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            background: conic-gradient(from 0deg, transparent 0deg, rgba(244, 63, 94, 0.3) 10deg, transparent 20deg, transparent 40deg, rgba(6, 182, 212, 0.2) 50deg, transparent 60deg, transparent 90deg, rgba(244, 63, 94, 0.25) 100deg, transparent 110deg, transparent 150deg, rgba(6, 182, 212, 0.15) 160deg, transparent 170deg, transparent 200deg, rgba(251, 113, 133, 0.2) 210deg, transparent 220deg);
            animation: rayRotate 60s linear infinite;
        }

        .light-rays::after {
            transform: translate(-50%, -50%) rotate(120deg);
            animation-direction: reverse;
            animation-duration: 80s;
            opacity: 0.6;
        }

        @keyframes rayRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Subtle Glow Orb */
        .glow-orb {
            position: fixed;
            top: 30%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(244, 63, 94, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            animation: orbPulse 8s ease-in-out infinite;
        }

        @keyframes orbPulse {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
        }

        /* Animated Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
        }

        .particle:nth-child(2) {
            left: 20%;
            animation-delay: -2s;
            animation-duration: 18s;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.5) 0%, transparent 70%);
        }

        .particle:nth-child(3) {
            left: 40%;
            animation-delay: -4s;
            animation-duration: 20s;
            background: radial-gradient(circle, rgba(251, 113, 133, 0.4) 0%, transparent 70%);
        }

        .particle:nth-child(4) {
            left: 60%;
            animation-delay: -6s;
            animation-duration: 16s;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.5) 0%, transparent 70%);
        }

        .particle:nth-child(5) {
            left: 80%;
            animation-delay: -8s;
            animation-duration: 22s;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
        }

        .particle:nth-child(6) {
            left: 10%;
            animation-delay: -10s;
            animation-duration: 17s;
            background: radial-gradient(circle, rgba(251, 113, 133, 0.3) 0%, transparent 70%);
            width: 3px;
            height: 3px;
        }

        .particle:nth-child(7) {
            left: 30%;
            animation-delay: -12s;
            animation-duration: 19s;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.4) 0%, transparent 70%);
            width: 5px;
            height: 5px;
        }

        .particle:nth-child(8) {
            left: 50%;
            animation-delay: -14s;
            animation-duration: 21s;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.5) 0%, transparent 70%);
        }

        .particle:nth-child(9) {
            left: 70%;
            animation-delay: -3s;
            animation-duration: 23s;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.3) 0%, transparent 70%);
            width: 6px;
            height: 6px;
        }

        .particle:nth-child(10) {
            left: 90%;
            animation-delay: -7s;
            animation-duration: 18s;
            background: radial-gradient(circle, rgba(251, 113, 133, 0.4) 0%, transparent 70%);
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-2%, 2%) rotate(1deg); }
            50% { transform: translate(2%, -2%) rotate(-1deg); }
            75% { transform: translate(-1%, 1%) rotate(0.5deg); }
        }

        /* Grid Pattern */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(244, 63, 94, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 63, 94, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 50px;
            height: 50px;
            position: relative;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: var(--secondary);
            animation-duration: 1.5s;
            animation-direction: reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Container - Full Screen */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* Header - Premium */
        .header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: none;
            background: transparent;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header-badge {
            display: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Content Area - Flex grow to fill space with premium spacing */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 32px;
            overflow: hidden;
        }

        /* Tool Hero - Premium width with impact */
        .tool-hero {
            text-align: center;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding-bottom: 16px;
        }

        .tool-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.15), rgba(251, 113, 133, 0.15));
            border: 1px solid rgba(244, 63, 94, 0.3);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fecdd3;
            margin-bottom: 24px;
            animation: fadeIn 0.4s ease-out;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tool-badge svg {
            width: 16px;
            height: 16px;
            color: #fda4af;
        }

        .tool-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            animation: fadeIn 0.4s ease-out 0.05s backwards;
            text-shadow: 0 0 60px rgba(244, 63, 94, 0.5);
            letter-spacing: -0.03em;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            text-align: center;
        }

        .tool-title span {
            display: inline;
            white-space: normal;
        }

        .tool-title .gradient {
            background: linear-gradient(135deg, #fff 0%, var(--primary) 30%, var(--secondary) 60%, var(--cyan) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tool-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 550px;
            margin: 0 auto 24px;
            animation: fadeIn 0.4s ease-out 0.1s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Benefits - Horizontal pills with better spacing */
        .benefits-minimal {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease-out 0.15s backwards;
        }

        .benefit-minimal {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(244, 63, 94, 0.08);
            border: 1px solid rgba(244, 63, 94, 0.15);
            border-radius: 50px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .benefit-minimal svg {
            width: 14px;
            height: 14px;
            color: #fda4af;
            flex-shrink: 0;
        }

        /* CTA Section - After benefits with premium styling */
        .cta-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease-out 0.2s backwards;
        }

        /* Modern Title - Soft CTA */
        .cta-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 16px;
            letter-spacing: 0;
            position: relative;
            display: inline-block;
            color: rgba(255, 255, 255, 0.4);
            text-transform: lowercase;
        }

        .cta-title::after {
            display: none;
        }

        .cta-title .gradient {
            background: linear-gradient(135deg, #fff 0%, #fecdd3 50%, #fda4af 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Premium CTA Button - Larger with stronger glow */
        .cta-main-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 24px 48px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 50%, #06b6d4 100%);
            color: #ffffff;
            border: none;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 8px 40px rgba(244, 63, 94, 0.7),
                0 0 80px rgba(244, 63, 94, 0.4),
                0 0 120px rgba(6, 182, 212, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
            width: auto;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .cta-main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .cta-main-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow:
                0 12px 50px rgba(244, 63, 94, 0.8),
                0 0 100px rgba(244, 63, 94, 0.5),
                0 0 150px rgba(6, 182, 212, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .cta-main-btn:hover::before {
            left: 100%;
        }

        .cta-main-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .cta-main-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.2s ease;
            animation: arrowBounce 2s ease-in-out infinite;
        }

        .cta-main-btn:hover svg {
            transform: translateX(6px);
            animation: none;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        .cta-trust {
            margin-top: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .cta-trust-primary {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        .cta-trust-secondary {
            color: #64748b;
            font-weight: 400;
        }

        .cta-trust-separator {
            width: 5px;
            height: 5px;
            background: #64748b;
            border-radius: 50%;
        }

        .cta-trust svg {
            width: 16px;
            height: 16px;
            color: #10b981;
        }

        /* Modal - Modern Minimalistic Design */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transform: scale(0.92) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.12), rgba(6, 182, 212, 0.12));
            margin: 0 auto 24px;
            border: 1px solid rgba(244, 63, 94, 0.15);
        }

        .modal-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: -0.03em;
        }

        .modal-desc {
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 32px;
            line-height: 1.7;
            font-size: 1rem;
        }

        .modal-btn {
            width: 100%;
            padding: 18px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.35);
            position: relative;
            overflow: hidden;
        }

        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(244, 63, 94, 0.5);
            background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%);
        }

        .modal-btn:hover::before {
            left: 100%;
        }

        .modal-btn:active {
            transform: translateY(-1px);
        }

        .modal-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .modal-btn:hover svg {
            transform: translateX(4px);
        }

        /* Responsive - Mobile Optimized */
        @media (max-width: 480px) {
            .header {
                padding: 16px 20px;
            }

            .logo-icon {
                width: 44px;
                height: 44px;
                border-radius: 10px;
            }

            .logo-icon svg {
                width: 22px;
                height: 22px;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .header-badge {
                display: none;
            }

            .content {
                padding: 0 20px;
            }

            .tool-badge {
                padding: 8px 16px;
                font-size: 0.75rem;
                margin-bottom: 18px;
            }

            .tool-badge svg {
                width: 14px;
                height: 14px;
            }

            .tool-title {
                font-size: clamp(2rem, 10vw, 3rem);
                margin-bottom: 18px;
                text-shadow: 0 0 40px rgba(244, 63, 94, 0.4);
                letter-spacing: -0.02em;
            }

            .tool-subtitle {
                font-size: 1rem;
                margin-bottom: 18px;
                line-height: 1.5;
            }

            .benefits-minimal {
                gap: 8px;
                margin-bottom: 24px;
            }

            .benefit-minimal {
                padding: 8px 14px;
                font-size: 0.75rem;
            }

            .benefit-minimal svg {
                width: 12px;
                height: 12px;
            }

            .cta-section {
                margin-top: 0;
            }

            .cta-title {
                font-size: clamp(0.85rem, 3vw, 1.1rem);
                margin-bottom: 14px;
                color: rgba(255, 255, 255, 0.5);
            }

            .cta-main-btn {
                padding: 26px 48px;
                font-size: 1.25rem;
                gap: 12px;
            }

            .cta-trust {
                margin-top: 16px;
                font-size: 0.8rem;
            }

            .modal {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .modal-icon {
                width: 56px;
                height: 56px;
                border-radius: 16px;
                margin-bottom: 20px;
            }

            .modal-title {
                font-size: 1.3rem;
                margin-bottom: 10px;
            }

            .modal-desc {
                font-size: 0.95rem;
                margin-bottom: 28px;
            }

            .modal-btn {
                padding: 16px 28px;
                font-size: 1rem;
                border-radius: 12px;
            }
        }

        /* Large phones and small tablets */
        @media (min-width: 481px) and (min-height: 600px) {
            .cta-main-btn {
                padding: 28px 56px;
